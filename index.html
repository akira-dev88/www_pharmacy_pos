<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme SaaS Academy</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (required for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script src="navigation.js"></script>
</head>

<body>

    <header>
        <div class="logo-area">
            <h1>Setup you pharmacy POS and Inventory</h1>
        </div>
        <div class="header-actions">
            <div class="badge-pro">
                <i class="fas fa-chalkboard-user"></i>
                <span>Book Demo Today</span>
            </div>
        </div>
    </header>

    <div class="layout">
        <aside id="sidebar"></aside>
        <main>
            <article id="content">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-pulse"></i> Loading curriculum...
                </div>
            </article>
            <div class="nav-buttons">
                <button id="prevBtn"><i class="fas fa-arrow-left"></i> Previous</button>
                <button id="nextBtn">Next <i class="fas fa-arrow-right"></i></button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>

</body>

</html>
